<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="botGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6c63ff"/>
      <stop offset="100%" style="stop-color:#4a42d4"/>
    </linearGradient>
  </defs>
  
  <!-- Bot body -->
  <rect x="12" y="20" width="40" height="36" rx="8" fill="url(#botGrad)"/>
  
  <!-- Bot head/top -->
  <rect x="18" y="10" width="28" height="14" rx="6" fill="url(#botGrad)"/>
  
  <!-- Antenna -->
  <circle cx="32" cy="6" r="4" fill="url(#botGrad)"/>
  <line x1="32" y1="10" x2="32" y2="16" stroke="url(#botGrad)" stroke-width="3"/>
  
  <!-- Eyes -->
  <circle cx="24" cy="36" r="5" fill="white"/>
  <circle cx="40" cy="36" r="5" fill="white"/>
  <circle cx="25" cy="36" r="2.5" fill="#1a1a2e"/>
  <circle cx="41" cy="36" r="2.5" fill="#1a1a2e"/>
  
  <!-- Mouth/speaker -->
  <rect x="26" y="46" width="12" height="4" rx="2" fill="white" opacity="0.8"/>
  
  <!-- Side panels -->
  <rect x="8" y="28" width="4" height="20" rx="2" fill="url(#botGrad)"/>
  <rect x="52" y="28" width="4" height="20" rx="2" fill="url(#botGrad)"/>
</svg>
